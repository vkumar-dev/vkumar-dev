<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚂 LOCOMETER - Code Growth Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            text-align: center;
            padding: 2rem 1rem 1rem;
        }
        header h1 {
            font-size: 2rem;
            color: #ffffff;
            margin-bottom: 0.25rem;
        }
        header p {
            color: #8b949e;
            font-size: 1rem;
        }
        .chart-container {
            width: 95%;
            max-width: 1400px;
            margin: 1.5rem auto;
            padding: 0 1rem;
        }
        .chart-container img {
            width: 100%;
            border-radius: 12px;
            border: 1px solid #21262d;
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin: 1rem 0 2rem;
        }
        .stat-box {
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 10px;
            padding: 1rem 1.5rem;
            text-align: center;
            min-width: 150px;
        }
        .stat-box .value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #58a6ff;
        }
        .stat-box .label {
            font-size: 0.85rem;
            color: #8b949e;
            margin-top: 0.25rem;
        }
        footer {
            text-align: center;
            padding: 1rem;
            color: #484f58;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>🚂 LOCOMETER</h1>
        <p>Code Growth Dashboard — vkumar-dev</p>
    </header>
    <div class="stats" id="stats"></div>
    <div class="chart-container">
        <img src="./loc-chart.png" alt="LOC Chart">
    </div>
    <footer>
        Generated by <strong>LOCOMETER</strong> · Updated daily · 
        <a href="https://github.com/vkumar-dev/vkumar-dev" style="color:#58a6ff;text-decoration:none">View Repo</a>
    </footer>
    <script>
        // Load stats from CSV
        fetch('../loc-data/loc-history.csv')
            .then(r => r.text())
            .then(csv => {
                const lines = csv.trim().split('\n');
                const last = lines[lines.length - 1];
                const [date, loc, files] = last.split(',');
                
                const locNum = parseInt(loc).toLocaleString();
                const filesNum = parseInt(files).toLocaleString();
                
                // Calculate growth if we have 2+ entries
                let growthHTML = '';
                if (lines.length >= 3) {
                    const prev = lines[lines.length - 2].split(',');
                    const diff = parseInt(loc) - parseInt(prev[2]);
                    const sign = diff >= 0 ? '+' : '';
                    growthHTML = `<div class="stat-box">
                        <div class="value" style="color:${diff >= 0 ? '#3fb950' : '#f85149'}">${sign}${diff.toLocaleString()}</div>
                        <div class="label">Growth Since Last Run</div>
                    </div>`;
                }
                
                document.getElementById('stats').innerHTML = `
                    <div class="stat-box">
                        <div class="value">${locNum}</div>
                        <div class="label">Total Lines of Code</div>
                    </div>
                    ${growthHTML}
                    <div class="stat-box">
                        <div class="value">${filesNum}</div>
                        <div class="label">Total Files</div>
                    </div>
                    <div class="stat-box">
                        <div class="value" style="color:#d2a8ff">${date}</div>
                        <div class="label">Last Updated</div>
                    </div>
                `;
            });
    </script>
</body>
</html>
